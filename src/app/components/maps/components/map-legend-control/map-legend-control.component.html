<p-card
  header=""
  styleClass="card-legend p-2!"
>
  <div class="flex flex-wrap items-center gap-4 text-sm">
    <div class="flex flex-wrap justify-between gap-6">

      <div
        *ngFor="let layer of baseLayers"
        class="flex align-items-center gap-2"
      >

        <p-radiobutton
          [inputId]="layer.key"
          name="baseLayer"
          [value]="layer.key"
          [(ngModel)]="selectedBaseLayer"
          (ngModelChange)="onBaseLayerChange($event)"
        />

        <label [for]="layer.key">
          {{ layer.name }}
        </label>

      </div>
    </div>
  </div>
</p-card>
